<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spotifyndr{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/_nav_sidebar.html' %}
    {% include 'partials/_nav_mobile.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'partials/_toast.html' %}
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/core/socket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
