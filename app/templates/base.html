<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spotifyndr{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/navigation.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/modals.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'partials/_nav_sidebar.html' %}
    {% include 'partials/_nav_mobile.html' %}

    <!-- Main Content -->
    <div class="app-layout">
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" aria-label="Bottom navigation">
        <ul class="bottom-nav-items">
            <li><a href="{{ url_for('explore.explore') }}" class="bottom-nav-item {% if request.endpoint and 'explore' in request.endpoint %}active{% endif %}">
                <span class="bottom-nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </span>
                <span>Explore</span>
            </a></li>
            <li><a href="{{ url_for('fyp.fyp') }}" class="bottom-nav-item {% if request.endpoint and 'fyp' in request.endpoint %}active{% endif %}">
                <span class="bottom-nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                </span>
                <span>For You</span>
            </a></li>
            <li><a href="{{ url_for('mutuals.mutuals') }}" class="bottom-nav-item {% if request.endpoint and 'mutuals' in request.endpoint %}active{% endif %}">
                <span class="bottom-nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </span>
                <span>Mutuals</span>
            </a></li>
            <li><a href="{{ url_for('messaging.messaging') }}" class="bottom-nav-item {% if request.endpoint and 'messaging' in request.endpoint %}active{% endif %}">
                <span class="bottom-nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </span>
                <span>Messages</span>
            </a></li>
            <li><a href="{{ url_for('profile.profile') }}" class="bottom-nav-item {% if request.endpoint and 'profile' in request.endpoint %}active{% endif %}">
                <span class="bottom-nav-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </span>
                <span>Profile</span>
            </a></li>
        </ul>
    </nav>

    {% include 'partials/_toast.html' %}

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/core/socket.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Mobile menu toggle (backward compat with inline menu)
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('menu-toggle');
            const mobileNavMenu = document.getElementById('nav-menu');

            if (menuToggle && mobileNavMenu) {
                menuToggle.addEventListener('click', function() {
                    mobileNavMenu.classList.toggle('open');
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
