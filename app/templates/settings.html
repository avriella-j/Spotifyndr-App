{% extends "base.html" %}

{% block title %}Settings - Spotifyndr{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/settings.css') }}">
{% endblock %}

{% block content %}
<div class="settings-page">
    <h1>Settings</h1>
    
    <form id="settings-form" class="settings-form">
        <div class="form-group">
            <label for="display-name">Display Name</label>
            <input type="text" id="display-name" name="display_name" value="{{ current_user.display_name }}" placeholder="Your display name">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ current_user.email }}" placeholder="you@example.com">
        </div>
        
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    
    <div class="danger-zone">
        <h2>Danger Zone</h2>
        <p>Once you delete your account, there is no going back. Please be certain.</p>
        <button class="btn btn-danger" id="delete-account">Delete Account</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/pages/settings.js') }}"></script>
{% endblock %}
