{% extends "base.html" %}

{% block title %}Settings - Spotifyndr{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/settings.css') }}">
{% endblock %}

{% block content %}
<div class="marketing-page">
    <div class="marketing-hero">
        <h1>Settings</h1>
        <p>Update your profile details and manage your account.</p>
    </div>

    <div class="marketing-section">
        <form id="settings-form" class="marketing-form">
            <div class="form-group">
                <label for="display-name">Display Name</label>
                <input type="text" id="display-name" name="display_name" value="{{ current_user.display_name }}">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ current_user.email }}">
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>

        <div class="danger-zone">
            <h2>Danger Zone</h2>
            <button class="btn btn-danger" id="delete-account">Delete Account</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/pages/settings.js') }}"></script>
{% endblock %}
