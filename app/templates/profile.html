{% extends "base.html" %}

{% block title %}Profile - Spotifyndr{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/profile.css') }}">
{% endblock %}

{% block content %}
<div class="profile-page">
    <div class="profile-header">
        <img src="{{ current_user.image_url or url_for('static', filename='img/default-avatar.svg') }}" alt="Profile" class="profile-avatar">
        <h1 class="profile-name">{{ current_user.display_name }}</h1>
        <div class="profile-stats">
            <div class="stat-item">
                <span class="stat-value" id="followers-count">0</span>
                <span class="stat-label">Followers</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="following-count">0</span>
                <span class="stat-label">Following</span>
            </div>
        </div>
    </div>
    
    <div class="profile-content">
        <div class="top-section">
            <h2 class="section-title">Top Tracks</h2>
            <div class="horizontal-scroll" id="top-tracks">
            </div>
        </div>
        
        <div class="top-section">
            <h2 class="section-title">Top Artists</h2>
            <div class="horizontal-scroll" id="top-artists">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/pages/profile.js') }}"></script>
{% endblock %}
